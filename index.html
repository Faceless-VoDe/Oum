// QUIZ DATA
const quiz = [
    {question:"What's my favorite food?",answers:["Pizza","Burger","Chicken"],correct:1},
    {question:"What's our anniversary?",answers:["April 24","May 10","June 1"],correct:0},
    {question:"My favorite part of your body?",answers:["Eyes","Lips","Hands"],correct:1},
    {question:"What’s something that always reminds you of me?💖",type:"input"},
    {question:"What do I love doing when it's just us? 💖",type:"input"}
];

let current=0;

// LOAD QUESTION
function loadQuestion(){
    let q=quiz[current];
    document.getElementById("progress").innerText=`Question ${current+1} of ${quiz.length}`;
    document.getElementById("question").innerText=q.question;
    let answers=document.getElementById("answers");
    answers.innerHTML="";

    if(q.type==="input"){
        answers.innerHTML=`
        <input id="inputAns" placeholder="Type your answer...">
        <button onclick="submitInput()">Submit</button>`;
    }else{
        q.answers.forEach((a,i)=>{
            let btn=document.createElement("button");
            btn.innerText=a;
            btn.onclick=()=>check(i);
            answers.appendChild(btn);
        });
    }
}

function check(i){
    next();
}

function submitInput(){
    let val=document.getElementById("inputAns").value.trim();
    if(val!=="") next();
}

// NEXT QUESTION OR SHOW VERIFICATION
function next(){
    current++;
    if(current<quiz.length) loadQuestion();
    else verification();
}

// CONFETTI EFFECT
function startConfetti(){
    const canvas=document.getElementById("confetti");
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    let pieces=[];
    for(let i=0;i<100;i++){
        pieces.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            size:Math.random()*5+2,
            speed:Math.random()*3+2
        });
    }

    function update(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(p=>{
            ctx.fillStyle = `hsl(${Math.random()*360}, 100%, 70%)`;
            ctx.fillRect(p.x,p.y,p.size,p.size);
            p.y+=p.speed;
            if(p.y>canvas.height) p.y=0;
        });
        requestAnimationFrame(update);
    }
    update();
}
